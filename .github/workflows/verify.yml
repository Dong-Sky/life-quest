name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Check types
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build production app
        run: npm run build
